<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Form</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="form-container">
    <h1>Create an Account</h1>
    
    <!-- novalidate disables default browser tooltips so our custom JS can take over -->
    <form id="signup-form" novalidate>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <span class="error-msg" id="email-error"></span>
      </div>

      <div class="input-group">
        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="">Select a country...</option>
          <option value="us">United States</option>
          <option value="ca">Canada</option>
          <option value="uk">United Kingdom</option>
        </select>
        <span class="error-msg" id="country-error"></span>
      </div>

      <div class="input-group">
        <label for="zipcode">Postal Code (ZIP)</label>
        <!-- Regex requires 5 digits -->
        <input type="text" id="zipcode" name="zipcode" pattern="^[0-9]{5}$" required>
        <span class="error-msg" id="zip-error"></span>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="8" required>
        <span class="error-msg" id="pwd-error"></span>
      </div>

      <div class="input-group">
        <label for="passwordConfirm">Confirm Password</label>
        <input type="password" id="passwordConfirm" name="passwordConfirm" required>
        <span class="error-msg" id="pwd-confirm-error"></span>
      </div>

      <button type="submit" id="submit-btn">Register</button>
    </form>
  </div>
</body>
</html>
